<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Churn Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h2>Customer Churn Prediction Form</h2>
    <form action="/predict" method="post">
        <!-- Demographics -->
        <label>Age:</label>
        <input type="number" name="Age" required><br>

        <label>Gender:</label>
        <select name="Gender" required>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select><br>

        <!-- Account info -->
        <label>Tenure (months):</label>
        <input type="number" name="Tenure" required><br>

        <label>Monthly Charges:</label>
        <input type="number" step="0.01" name="MonthlyCharges" required><br>

        <label>Total Charges:</label>
        <input type="number" step="0.01" name="TotalCharges" required><br>

        <label>Contract:</label>
        <select name="Contract" required>
            <option value="Month-to-month">Month-to-month</option>
            <option value="One year">One year</option>
            <option value="Two year">Two year</option>
        </select><br>

        <label>Internet Service:</label>
        <select name="InternetService" required>
            <option value="None">None</option>
            <option value="DSL">DSL</option>
            <option value="Fiber">Fiber</option>
        </select><br>

        <!-- Services -->
        <label>Tech Support:</label>
        <select name="TechSupport" required>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select><br>

        <label>Online Security:</label>
        <select name="OnlineSecurity" required>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select><br>

        <label>Payment Method:</label>
        <select name="PaymentMethod" required>
            <option value="Credit Card">Credit Card</option>
            <option value="Bank Transfer">Bank Transfer</option>
            <option value="Electronic Check">Electronic Check</option>
            <option value="UPI">UPI</option>
        </select><br>

        <!-- Usage & satisfaction -->
        <label>Support Calls:</label>
        <input type="number" name="SupportCalls" required><br>

        <label>Satisfaction Score:</label>
        <input type="number" name="SatisfactionScore" min="1" max="10" required><br>

        <button type="submit">Predict</button>
    </form>
</body>
</html>
